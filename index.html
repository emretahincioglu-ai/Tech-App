<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0E1116;--panel:#161B22;--panel2:#1B212B;--bd:#262E3A;--ink:#E8ECF2;--mut:#8B94A3;--grn:#3DAE4B;--grn2:#54C95F;--red:#e0503c;--amb:#e0a30b}
body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#05080b;color:var(--ink);display:flex;justify-content:center;min-height:100vh}
.app{width:100%;max-width:430px;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;position:relative;box-shadow:0 0 60px rgba(0,0,0,.5)}
.bar{background:linear-gradient(135deg,#10341a,#0b1710);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.bar .mb{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
.bar .ttl{font-weight:800;letter-spacing:1px;font-size:14px;display:flex;align-items:center;gap:8px}
.bar .av{width:34px;height:34px;border-radius:50%;background:#0b0e12;border:1px solid rgba(61,174,75,.5);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--grn2);font-size:13px}
.body{flex:1;overflow-y:auto;padding:16px;padding-bottom:24px}
.greet{font-size:12px;color:var(--mut)}.hname{font-size:22px;font-weight:800;margin:2px 0 2px}
.role{font-size:11.5px;color:var(--grn2);margin-bottom:14px}
.qstrip{display:flex;gap:9px;margin-bottom:16px}
.q{flex:1;background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:12px 8px;text-align:center}
.q .n{font-size:22px;font-weight:800}.q .n.g{color:var(--grn2)}.q .l{font-size:9.5px;color:var(--mut);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.sec{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);font-weight:700;margin:18px 2px 10px}
.card{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:11px}
.kpi{display:flex;align-items:center;gap:12px;margin-bottom:14px}.kpi:last-child{margin-bottom:0}
.kpi .info{flex:1}.kpi .info .t{font-size:13.5px;font-weight:700}.kpi .info .s{font-size:11px;color:var(--mut);margin-top:2px}
.kpi .track{height:8px;background:#0e1218;border-radius:5px;margin-top:8px;overflow:hidden;border:1px solid #20262f}
.kpi .fill{height:100%;border-radius:5px}
.kpi .chip{font-size:10.5px;font-weight:800;padding:5px 11px;border-radius:20px;white-space:nowrap}
.chip.hit{background:rgba(61,174,75,.16);color:var(--grn2)}.chip.miss{background:rgba(224,80,60,.16);color:var(--red)}
.job{background:var(--panel);border:1px solid var(--bd);border-left:3px solid var(--grn);border-radius:12px;padding:13px;margin-bottom:11px}
.job.back{border-left-color:var(--amb)}
.job .h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.job .ti{font-weight:800;font-size:15px}.job .bg{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;background:rgba(224,160,11,.16);color:var(--amb)}
.job .tr{font-size:11px;color:var(--grn2);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.job .ad{font-size:12px;color:var(--mut);margin:6px 0 10px}
.job .ck{display:flex;align-items:center;gap:9px;font-size:13px;color:#c7cdd6;padding:5px 0;cursor:pointer}
.job .ck i{width:18px;height:18px;border:2px solid var(--grn);border-radius:5px;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;font-style:normal}
.job .ck.done i{background:var(--grn);color:#06210b}.job .ck.done{color:var(--mut);text-decoration:line-through}
.daylbl{font-size:13px;font-weight:800;color:#fff;margin:16px 2px 8px;display:flex;justify-content:space-between}.daylbl span{color:var(--grn2)}
.menu{position:absolute;inset:0;background:rgba(5,8,11,.6);z-index:30;display:none}.menu.on{display:block}
.sheet{position:absolute;top:0;left:0;right:0;background:var(--panel);border-bottom:1px solid var(--bd);padding:10px;border-radius:0 0 18px 18px}
.sheet h4{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin:8px 10px 6px}
.sheet button{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;color:var(--ink);text-align:left;padding:13px 12px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.sheet button.on{background:rgba(61,174,75,.14);color:var(--grn2)}
.sw{padding:6px 10px 10px}.sw select{width:100%;background:var(--panel2);border:1px solid var(--bd);border-radius:10px;color:var(--ink);padding:11px;font-size:14px;font-weight:600}
.tabbar{display:flex;border-top:1px solid var(--bd);background:#0b0e12;position:sticky;bottom:0}
.tabbar button{flex:1;background:none;border:none;color:var(--mut);padding:11px 0 13px;font-size:10.5px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.tabbar button.on{color:var(--grn2)}.tabbar .ic{font-size:18px}

.heroring{display:flex;align-items:center;gap:18px;background:linear-gradient(135deg,#10341a,#0c1f12);border:1px solid rgba(61,174,75,.4);border-radius:18px;padding:18px;margin-bottom:16px}
.heroring .txt h3{font-size:16px;margin-bottom:4px}.heroring .txt p{font-size:12px;color:#bfe3c7;line-height:1.4}
.gwrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gauge{background:var(--panel);border:1px solid var(--bd);border-radius:16px;padding:14px 8px 13px;text-align:center}
.gauge .lbl{font-size:11.5px;font-weight:700;margin-top:6px}
.gauge .goal{font-size:9.5px;color:var(--mut);margin-top:3px}
.gauge .stat{font-size:9px;font-weight:800;margin-top:7px;padding:3px 9px;border-radius:20px;display:inline-block}
.stat.hit{background:rgba(61,174,75,.16);color:var(--grn2)}.stat.close{background:rgba(224,160,11,.16);color:var(--amb)}.stat.miss{background:rgba(224,80,60,.16);color:var(--red)}</style></head>
